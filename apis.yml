aid: lime
name: Lime
description: >-
  Lime is a San Francisco–based shared electric vehicle company that operates
  e-scooters and e-bikes across more than 280 cities in 30+ countries. Riders
  unlock and pay for vehicles through the Lime mobile app; cities and transit
  agencies receive operational data via standardized public feeds. Lime
  publishes per-city public GBFS (General Bikeshare Feed Specification) 2.2
  feeds covering system information, station information, station status, free
  (dockless) bike status, and vehicle types under the Lime Public GBFS Terms.
  Lime also publishes MDS Extensions on GitHub — an open-source aggregation
  layer that sits on top of the MDS Provider standard for sharing
  k-anonymized operational data with regulators. There is no public,
  commercially licensable rider/booking API; the rider-facing endpoints at
  web-production.lime.bike are private to the Lime app. Integrations with
  trip-planning surfaces (Google Maps, Uber, Moovit, Citymapper) and city
  permit dashboards are delivered through the GBFS and MDS feeds.
