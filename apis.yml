apis:
  - aid: lime:lime-gbfs
    name: Lime GBFS Public Feed
    description: >-
      Public GBFS 2.2 feed exposing the real-time location, vehicle type,
      battery level, and rental URLs for Lime's free-floating e-scooters and
      e-bikes per operating city. Each city system has its own auto-discovery
      endpoint at /api/partners/v2/gbfs/{city}/gbfs.json, which lists the
      sub-feeds — system_information, station_information, station_status,
      free_bike_status, and vehicle_types. Use is governed by the Lime Public
      GBFS Terms. 46+ city systems are registered in the MobilityData GBFS
      index, including Paris, London, Berlin, Hamburg, Rome, Madrid, Vienna,
      Tel Aviv, Calgary, Ottawa, Vancouver, Atlanta, Arlington, and others.
    humanURL: https://www.li.me/legal/public-gbfs-terms
    tags:
      - GBFS
      - Shared Mobility
      - Micromobility
      - Real Time
